name: Discord Update Notification

on:
  push:
    branches: [main]
    paths:
      - "source/**"

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          REPO: ${{ github.repository }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: |
          set -euo pipefail

          SHORT_SHA="${COMMIT_SHA:0:7}"
          PARENT_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")

          # Skip auto version bump commits
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          if echo "$FIRST_LINE" | grep -q "^\[auto\] version bump"; then
            echo "Skipping version bump commit"
            exit 0
          fi

          # ── Find source file ──
          SOURCE_FILE=""
          for f in source/*.lua; do
            [ -f "$f" ] && SOURCE_FILE="$f" && break
          done
          if [ -z "$SOURCE_FILE" ]; then
            echo "No source/*.lua found — aborting"
            exit 0
          fi
          echo "Source file: $SOURCE_FILE"

          # ── Validate V7 header ──
          LINE1=$(sed -n "1p" "$SOURCE_FILE")
          LINE2=$(sed -n "2p" "$SOURCE_FILE")
          LINE3=$(sed -n "3p" "$SOURCE_FILE")
          LINE4=$(sed -n "4p" "$SOURCE_FILE")

          echo "Header check:"
          echo "  L1: $LINE1"
          echo "  L2: $LINE2"
          echo "  L3: $LINE3"
          echo "  L4: $LINE4"

          if ! echo "$LINE1" | grep -qF "local SCRIPT_VERSION = \""; then
            echo "Skipping — line 1 mismatch"
            exit 0
          fi
          EXP2="local SCRIPT_VERSION_DISPLAY = \"7.\"..SCRIPT_VERSION"
          if [ "$LINE2" != "$EXP2" ]; then
            echo "Skipping — line 2 mismatch"
            exit 0
          fi
          EXP3="local VERSION_URL = \"https://raw.githubusercontent.com/binx-ux/airhub-binxix-v7/main/VERSION\""
          if [ "$LINE3" != "$EXP3" ]; then
            echo "Skipping — line 3 mismatch: $LINE3"
            exit 0
          fi
          EXP4="local INTEGRITY_HASH = \"binxix_v7_official\""
          if [ "$LINE4" != "$EXP4" ]; then
            echo "Skipping — line 4 mismatch"
            exit 0
          fi
          echo "V7 header validated"

          # ── Offline / maintenance check ──
          LOWER_MSG=$(echo "$FIRST_LINE" | tr "[:upper:]" "[:lower:]")
          if echo "$LOWER_MSG" | grep -qE "(offline|updating)"; then
            echo "Sending offline embed"
            SAFE_MSG=$(echo "$FIRST_LINE" | sed "s/[\"\\\\]//g")
            curl -s -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"Binxix Hub V7\",\"embeds\":[{\"title\":\"Binxix Hub — Offline / Updating\",\"color\":15158332,\"description\":\"**Binxix Hub is currently offline.**\\n\\nPlease wait — back online shortly.\",\"fields\":[{\"name\":\"Pushed by\",\"value\":\"${AUTHOR}\",\"inline\":true},{\"name\":\"Commit\",\"value\":\"${SHORT_SHA}\",\"inline\":true}],\"footer\":{\"text\":\"${REPO}\"},\"timestamp\":\"${TIMESTAMP}\"}]}" \
              "$DISCORD_WEBHOOK"
            exit 0
          fi

          # ── Version bump ──
          if [ -f "VERSION" ]; then
            BUILD_NUM=$(cat VERSION | tr -d "[:space:]")
          else
            BUILD_NUM=0
          fi
          BUILD_NUM=$((BUILD_NUM + 1))
          PADDED=$(printf "%03d" "$BUILD_NUM")
          VERSION="v7.${PADDED}"
          echo "$BUILD_NUM" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "[auto] version bump to ${VERSION}" || true
          git push || true
          echo "Version: $VERSION"

          # ── Build diff summary ──
          STATS=""
          CHANGES=""
          if [ -n "$PARENT_SHA" ] && git diff --name-only "$PARENT_SHA" HEAD | grep -qF "$SOURCE_FILE"; then
            INS=$(git diff --numstat "$PARENT_SHA" HEAD -- "$SOURCE_FILE" | awk "{print \$1}")
            DEL=$(git diff --numstat "$PARENT_SHA" HEAD -- "$SOURCE_FILE" | awk "{print \$2}")
            STATS="+${INS:-0} / -${DEL:-0} lines"

            ADDED=$(git diff "$PARENT_SHA" HEAD -- "$SOURCE_FILE" | grep "^+" | grep -v "^+++" || true)

            NEW_FUNCS=$(echo "$ADDED" | grep -oP "(?:local\s+)?function\s+\K\w+" 2>/dev/null | sort -u | head -8 | tr "\n" " " || true)
            [ -n "$NEW_FUNCS" ] && CHANGES="${CHANGES}New functions: ${NEW_FUNCS}\n"

            NEW_TOGGLES=$(echo "$ADDED" | grep -oP "toggle.*\"\\K[^\"]+" 2>/dev/null | head -6 | tr "\n" ", " || true)
            [ -n "$NEW_TOGGLES" ] && CHANGES="${CHANGES}New toggles: ${NEW_TOGGLES}\n"

            NEW_GAMES=$(echo "$ADDED" | grep -oP "\{name\s*=\s*\"\K[^\"]+" 2>/dev/null | head -4 | tr "\n" ", " || true)
            [ -n "$NEW_GAMES" ] && CHANGES="${CHANGES}New games: ${NEW_GAMES}\n"
          fi

          # ── Build description ──
          SAFE_MSG=$(echo "$FIRST_LINE" | sed "s/[\"\\\\]//g")
          DESC="${SAFE_MSG}"
          [ -n "$STATS" ]   && DESC="${DESC}\\n${STATS}"
          [ -n "$CHANGES" ] && DESC="${DESC}\\n${CHANGES}"
          [ -z "$CHANGES" ] && DESC="${DESC}\\nMinor update"

          if [ "${#DESC}" -gt 3800 ]; then
            DESC="${DESC:0:3750}... and more"
          fi

          # ── Send embed ──
          PAYLOAD="{\"username\":\"Binxix Hub V7\",\"embeds\":[{\"title\":\"Binxix Hub ${VERSION}\",\"url\":\"${COMMIT_URL}\",\"color\":10181558,\"description\":\"${DESC}\",\"fields\":[{\"name\":\"Version\",\"value\":\"${VERSION}\",\"inline\":true},{\"name\":\"Commit\",\"value\":\"${SHORT_SHA}\",\"inline\":true},{\"name\":\"By\",\"value\":\"${AUTHOR}\",\"inline\":true}],\"footer\":{\"text\":\"${REPO}\"},\"timestamp\":\"${TIMESTAMP}\"}]}"

          echo "Sending payload..."
          HTTP_CODE=$(curl -s -o /tmp/discord_resp.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK")

          echo "HTTP $HTTP_CODE"
          cat /tmp/discord_resp.txt || true

          if [ "$HTTP_CODE" = "204" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Sent — ${VERSION}"
          else
            echo "Failed (HTTP $HTTP_CODE) — sending fallback plaintext"
            curl -s -H "Content-Type: application/json" \
              -d "{\"username\":\"Binxix Hub V7\",\"content\":\"${VERSION} — ${SAFE_MSG}\"}" \
              "$DISCORD_WEBHOOK"
          fi
