name: Binxix Hub Notifier

on:
  push:
    branches: [main]
    paths:
      - "source/**"

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        env:
          WEBHOOK:    ${{ secrets.DISCORD_WEBHOOK }}
          RAW_MSG:    ${{ github.event.head_commit.message }}
          SHA:        ${{ github.sha }}
          AUTHOR:     ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          REPO:       ${{ github.repository }}
          TIMESTAMP:  ${{ github.event.head_commit.timestamp }}
        run: |
          set -euo pipefail

          # ────────────────────────────────────────
          # BASICS
          # ────────────────────────────────────────
          MSG=$(echo "$RAW_MSG" | head -1)
          SHORT="${SHA:0:7}"
          PARENT=$(git rev-parse HEAD~1 2>/dev/null || echo "")

          echo "Commit: $MSG"
          echo "SHA:    $SHORT"
          echo "Author: $AUTHOR"

          # skip the auto bump commit this workflow itself makes
          if echo "$MSG" | grep -qF "[auto] version bump"; then
            echo ">> Skipping auto bump commit"
            exit 0
          fi

          # ────────────────────────────────────────
          # FIND LUA FILE
          # ────────────────────────────────────────
          LUA=""
          for f in source/*.lua; do
            [ -f "$f" ] && LUA="$f" && break
          done

          if [ -z "$LUA" ]; then
            echo ">> No source/*.lua found — skipping"
            exit 0
          fi
          echo "Lua file: $LUA"

          # ────────────────────────────────────────
          # VALIDATE V7 HEADER
          # Pull each line into a var then compare
          # with double-quoted strings so no single
          # quotes are needed anywhere in this file.
          # ────────────────────────────────────────
          L1=$(sed -n "1p" "$LUA")
          L2=$(sed -n "2p" "$LUA")
          L3=$(sed -n "3p" "$LUA")
          L4=$(sed -n "4p" "$LUA")

          echo "L1: $L1"
          echo "L2: $L2"
          echo "L3: $L3"
          echo "L4: $L4"

          WANT_L2="local SCRIPT_VERSION_DISPLAY = \"7.\"..SCRIPT_VERSION"
          WANT_L3="local VERSION_URL = \"https://raw.githubusercontent.com/binx-ux/airhub-binxix-v7/main/VERSION\""
          WANT_L4="local INTEGRITY_HASH = \"binxix_v7_official\""

          echo "$L1" | grep -qF "local SCRIPT_VERSION = " || { echo ">> L1 mismatch — skipping"; exit 0; }
          [ "$L2" = "$WANT_L2" ] || { echo ">> L2 mismatch — skipping"; exit 0; }
          [ "$L3" = "$WANT_L3" ] || { echo ">> L3 mismatch — skipping: $L3"; exit 0; }
          [ "$L4" = "$WANT_L4" ] || { echo ">> L4 mismatch — skipping"; exit 0; }

          echo ">> Header OK"

          # ────────────────────────────────────────
          # OFFLINE / MAINTENANCE MODE
          # If commit message contains offline or
          # updating, send a red status embed only.
          # ────────────────────────────────────────
          LOWER=$(echo "$MSG" | tr "[:upper:]" "[:lower:]")
          if echo "$LOWER" | grep -qE "offline|updating"; then
            echo ">> Sending offline embed"
            SAFE=$(echo "$MSG" | sed "s/[\"\`\\\\]//g")
            curl -fsSL \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"Binxix Hub\",\"embeds\":[{\"title\":\"Binxix Hub is Offline\",\"color\":15158332,\"description\":\"An update is being pushed. Do not execute until you see the next update ping.\",\"fields\":[{\"name\":\"Message\",\"value\":\"$SAFE\",\"inline\":false},{\"name\":\"By\",\"value\":\"$AUTHOR\",\"inline\":true},{\"name\":\"Commit\",\"value\":\"$SHORT\",\"inline\":true}],\"footer\":{\"text\":\"$REPO\"},\"timestamp\":\"$TIMESTAMP\"}]}" \
              "$WEBHOOK"
            exit 0
          fi

          # ────────────────────────────────────────
          # VERSION BUMP
          # Read VERSION file, increment, write back
          # ────────────────────────────────────────
          if [ -f VERSION ]; then
            NUM=$(cat VERSION | tr -d "[:space:]")
          else
            NUM=0
          fi
          NUM=$((NUM + 1))
          PAD=$(printf "%03d" "$NUM")
          VER="v7.$PAD"

          echo "$NUM" > VERSION
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "[auto] version bump to $VER" || true
          git push || true
          echo ">> Version: $VER"

          # ────────────────────────────────────────
          # DIFF SUMMARY
          # ────────────────────────────────────────
          STATS=""
          DETAILS=""

          if [ -n "$PARENT" ] && git diff --name-only "$PARENT" HEAD | grep -qF "$LUA"; then
            INS=$(git diff --numstat "$PARENT" HEAD -- "$LUA" | awk "{print \$1}")
            DEL=$(git diff --numstat "$PARENT" HEAD -- "$LUA" | awk "{print \$2}")
            STATS="+${INS:-0} / -${DEL:-0} lines"

            ADDED=$(git diff "$PARENT" HEAD -- "$LUA" | grep "^+" | grep -v "^+++" || true)

            FUNCS=$(echo "$ADDED" | grep -oP "function \K\w+" 2>/dev/null | sort -u | head -6 | tr "\n" " " || true)
            [ -n "$FUNCS" ] && DETAILS="${DETAILS}Functions: $FUNCS\n"

            GAMES=$(echo "$ADDED" | grep -oP "name=\"\K[^\"]+" 2>/dev/null | head -4 | tr "\n" ", " || true)
            [ -n "$GAMES" ] && DETAILS="${DETAILS}Games: $GAMES\n"
          fi

          # ────────────────────────────────────────
          # BUILD DESCRIPTION
          # ────────────────────────────────────────
          SAFE_MSG=$(echo "$MSG" | sed "s/[\"\`\\\\]//g")
          DESC="$SAFE_MSG"
          [ -n "$STATS"   ] && DESC="$DESC\n$STATS"
          [ -n "$DETAILS" ] && DESC="$DESC\n$DETAILS"
          [ -z "$DETAILS" ] && DESC="$DESC\nGeneral update"

          if [ "${#DESC}" -gt 3500 ]; then
            DESC="${DESC:0:3450}\n...truncated"
          fi

          # ────────────────────────────────────────
          # SEND EMBED
          # JSON is one line — no heredocs needed,
          # no single quotes, no YAML conflicts.
          # ────────────────────────────────────────
          JSON="{\"username\":\"Binxix Hub\",\"embeds\":[{\"title\":\"Binxix Hub $VER\",\"url\":\"$COMMIT_URL\",\"color\":10181558,\"description\":\"$DESC\",\"fields\":[{\"name\":\"Version\",\"value\":\"$VER\",\"inline\":true},{\"name\":\"Commit\",\"value\":\"[$SHORT]($COMMIT_URL)\",\"inline\":true},{\"name\":\"By\",\"value\":\"$AUTHOR\",\"inline\":true}],\"footer\":{\"text\":\"$REPO\"},\"timestamp\":\"$TIMESTAMP\"}]}"

          echo ">> Sending to Discord..."
          CODE=$(curl -s -o /tmp/dc.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$JSON" \
            "$WEBHOOK")

          echo "HTTP $CODE"
          cat /tmp/dc.txt

          if [ "$CODE" = "204" ] || [ "$CODE" = "200" ]; then
            echo ">> Sent — $VER"
          else
            echo ">> Embed failed, trying plaintext fallback"
            curl -fsSL \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"Binxix Hub\",\"content\":\"$VER pushed by $AUTHOR — $SAFE_MSG\"}" \
              "$WEBHOOK" && echo ">> Fallback sent" || echo ">> Fallback also failed"
          fi
